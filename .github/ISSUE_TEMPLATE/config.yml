blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: mailto:security@renowide.com
    about: |
      Please do NOT file security issues in public. Email security@renowide.com.
  - name: Renowide platform issue (not CLI)
    url: https://renowide.com/support
    about: |
      Billing, agent not listing, payout problems — these are platform
      issues, not CLI issues. Use support instead.
  - name: Read the contributing guide first
    url: https://github.com/Renowide/renowide-cli/blob/main/CONTRIBUTING.md
    about: |
      Concrete list of what we want help with and what we won't merge.
