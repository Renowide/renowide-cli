name: Publish to npm (Trusted Publishing)

# Publishes @renowide/cli, @renowide/types, @renowide/ui-kit, and
# @renowide/agent-sdk to npm whenever a matching version tag is pushed.
#
# Tag formats (each publishes exactly one workspace):
#   cli-v0.8.0         → packages/cli        → @renowide/cli
#   types-v0.2.0       → packages/types      → @renowide/types
#   ui-kit-v0.2.0      → packages/ui-kit     → @renowide/ui-kit
#   agent-sdk-v0.4.0   → packages/agent-sdk  → @renowide/agent-sdk
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
# Each package must be configured as a Trusted Publisher pointing at
# this workflow on npmjs.com → package → Settings → Publishing access.

on:
  push:
    tags:
      - 'cli-v*'
      - 'types-v*'
      - 'ui-kit-v*'
      - 'agent-sdk-v*'
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Workspace to publish: cli | types | ui-kit | agent-sdk'
        required: true
      version:
        description: 'Version in that workspace package.json (e.g. 0.8.0)'
        required: true

permissions:
  contents: read
  id-token: write   # required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (Trusted Publishing needs >= 11.5.1 for OIDC)
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Resolve workspace from tag or dispatch input
        id: resolve
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.workspace }}" ]]; then
            WS="${{ github.event.inputs.workspace }}"
            VER="${{ github.event.inputs.version }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
            case "$REF" in
              cli-v*)       WS=cli;       VER="${REF#cli-v}"       ;;
              types-v*)     WS=types;     VER="${REF#types-v}"     ;;
              ui-kit-v*)    WS=ui-kit;    VER="${REF#ui-kit-v}"    ;;
              agent-sdk-v*) WS=agent-sdk; VER="${REF#agent-sdk-v}" ;;
              *) echo "::error::Unknown tag format: $REF"; exit 1 ;;
            esac
          fi
          PKG_VERSION=$(node -p "require('./packages/${WS}/package.json').version")
          if [[ "$PKG_VERSION" != "$VER" ]]; then
            echo "::error::packages/${WS}/package.json version ($PKG_VERSION) does not match tag version ($VER)"
            exit 1
          fi
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "version=$VER"  >> "$GITHUB_OUTPUT"
          echo "Publishing @renowide/$WS@$VER"

      - name: Build all workspaces (needed for inter-package type refs)
        run: npm run build

      - name: Publish with provenance
        run: npm publish --access public --provenance --workspace=packages/${{ steps.resolve.outputs.workspace }}
