name: Publish to npm (Trusted Publishing)

# Publishes @renowide/cli to npm whenever a version tag is pushed.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
# Requires: Renowide/renowide-cli configured as a Trusted Publisher
# for @renowide/cli in npmjs.com → package → Settings → Publishing access.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to publish (must exist in package.json, e.g. 0.5.1)'
        required: false

permissions:
  contents: read
  id-token: write   # required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing @renowide/cli@$PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: npm publish --access public --provenance
