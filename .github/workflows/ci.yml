name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  node:
    name: Node (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/renowide-canvas
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e '.[fastapi]' pytest
      - name: Test
        run: pytest -q
