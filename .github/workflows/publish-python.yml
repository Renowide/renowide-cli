name: Publish renowide-canvas to PyPI (Trusted Publishing)

# Publishes renowide-canvas to PyPI whenever a matching tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no PyPI token required.
# Configure on pypi.org → project → Publishing → Add trusted publisher
# pointing at this workflow + environment.
#
# Tag format: canvas-v0.2.0

on:
  push:
    tags:
      - 'canvas-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version in pyproject.toml (e.g. 0.2.0)'
        required: true

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-release
    defaults:
      run:
        working-directory: python/renowide-canvas
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build + twine (twine only used for metadata checks)
        run: pip install build hatchling

      - name: Resolve version from tag or dispatch input
        id: resolve
        working-directory: .
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VER="${{ github.event.inputs.version }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
            VER="${REF#canvas-v}"
          fi
          PKG_VERSION=$(python -c "import tomllib,sys; print(tomllib.loads(open('python/renowide-canvas/pyproject.toml','rb').read().decode())['project']['version'])")
          if [[ "$PKG_VERSION" != "$VER" ]]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match tag ($VER)"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Publishing renowide-canvas==$VER"

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/renowide-canvas/dist
