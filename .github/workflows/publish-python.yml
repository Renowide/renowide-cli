name: Publish Python packages to PyPI (Trusted Publishing)

# Publishes either renowide-canvas or renowide-agent-sdk to PyPI
# whenever a matching version tag is pushed. Uses PyPI Trusted
# Publishing (OIDC) — no PyPI token required.
#
# Tag formats (each publishes exactly one package):
#   canvas-v0.2.0     → python/renowide-canvas      → renowide-canvas
#   agent-sdk-py-v0.4.0 → python/renowide-agent-sdk → renowide-agent-sdk
#
# Each project must be registered as a Trusted Publisher on pypi.org
# pointing at this workflow + the `pypi-release` environment.

on:
  push:
    tags:
      - 'canvas-v*'
      - 'agent-sdk-py-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish: canvas | agent-sdk'
        required: true
      version:
        description: 'Version in that package pyproject.toml (e.g. 0.4.0)'
        required: true

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: pip install build hatchling

      - name: Resolve package + version
        id: resolve
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.package }}" ]]; then
            PKG="${{ github.event.inputs.package }}"
            VER="${{ github.event.inputs.version }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
            case "$REF" in
              canvas-v*)        PKG=canvas;    VER="${REF#canvas-v}"        ;;
              agent-sdk-py-v*)  PKG=agent-sdk; VER="${REF#agent-sdk-py-v}"  ;;
              *) echo "::error::Unknown tag format: $REF"; exit 1 ;;
            esac
          fi
          case "$PKG" in
            canvas)    DIR="python/renowide-canvas";    NAME="renowide-canvas"    ;;
            agent-sdk) DIR="python/renowide-agent-sdk"; NAME="renowide-agent-sdk" ;;
            *) echo "::error::Unknown package: $PKG"; exit 1 ;;
          esac
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('$DIR/pyproject.toml','rb').read().decode())['project']['version'])")
          if [[ "$PKG_VERSION" != "$VER" ]]; then
            echo "::error::$DIR/pyproject.toml version ($PKG_VERSION) does not match tag ($VER)"
            exit 1
          fi
          echo "dir=$DIR"   >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Publishing $NAME==$VER from $DIR"

      - name: Build sdist + wheel
        working-directory: ${{ steps.resolve.outputs.dir }}
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.resolve.outputs.dir }}/dist
